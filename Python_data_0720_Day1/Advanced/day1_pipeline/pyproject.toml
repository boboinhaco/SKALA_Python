# [Day 1] 종합 실습 — 도구 설정 (pytest · ruff)

[tool.pytest.ini_options]
# tests/에서 src 패키지를 import할 수 있도록 프로젝트 루트를 경로에 추가
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
# E/F(pyflakes·pycodestyle), I(isort), UP(pyupgrade), B(bugbear) 규칙 적용
select = ["E", "F", "I", "UP", "B"]
# 테스트에서 밑줄 시작 내부 함수(_extract_weather_hours) import 허용 등 기본값 유지
